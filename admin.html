<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Ftesa Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;--goldl:#e8cc78;
  --dark:#0a0805;--dark2:#141008;--dark3:#1e1610;
  --text:#f5f0e8;--dim:rgba(245,240,232,.55);--dimmer:rgba(245,240,232,.32);
  --border:rgba(201,168,76,.22);--borderl:rgba(201,168,76,.1);
}
html,body{min-height:100%;font-family:'Montserrat',sans-serif;background:var(--dark);color:var(--text)}
.app{display:flex;min-height:100vh}
.sidebar{width:200px;flex-shrink:0;background:var(--dark2);border-right:1px solid var(--borderl);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sidebar-logo{padding:22px 20px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--gold);border-bottom:1px solid var(--borderl);text-decoration:none;display:block}
.sidebar-logo span{color:rgba(231,76,60,.7);font-size:10px;display:block;font-family:'Montserrat',sans-serif;font-style:normal;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.sidebar-nav{flex:1;padding:16px 0}
.s-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:all .18s;border:none;background:none;width:100%;text-align:left}
.s-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.s-item.active{color:var(--gold);background:rgba(201,168,76,.06);border-right:2px solid var(--gold)}
.main{margin-left:200px;flex:1}
.topbar{padding:18px 32px;background:var(--dark2);border-bottom:1px solid var(--borderl);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px}
.content{padding:32px}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat-card{background:var(--dark2);border:1px solid var(--borderl);border-radius:3px;padding:18px 20px}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--gold);display:block}
.stat-l{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dimmer);margin-top:4px;display:block}
.stat-delta{font-size:10px;margin-top:4px;display:block}
.green{color:#2ecc71}.red{color:#e74c3c}.gold{color:var(--gold)}

/* Table */
.table-card{background:var(--dark2);border:1px solid var(--borderl);border-radius:3px;overflow:hidden;margin-bottom:20px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--borderl);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.table-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px}
.search-input{
  padding:8px 14px;background:rgba(255,255,255,.04);border:1px solid var(--borderl);
  border-radius:2px;color:var(--text);font-size:12px;font-family:'Montserrat',sans-serif;
  outline:none;transition:border-color .2s;min-width:220px;
}
.search-input:focus{border-color:var(--border)}
.search-input::placeholder{color:var(--dimmer)}
table{width:100%;border-collapse:collapse}
th{padding:11px 16px;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dimmer);text-align:left;border-bottom:1px solid var(--borderl);background:rgba(255,255,255,.015);font-weight:500}
td{padding:13px 16px;font-size:11.5px;color:var(--dim);border-bottom:1px solid var(--borderl)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.018)}
.status{padding:3px 9px;border-radius:40px;font-size:7.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.s-pending{background:rgba(241,196,15,.12);border:1px solid rgba(241,196,15,.3);color:#f1c40f}
.s-paid{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.3);color:#2ecc71}
.s-delivered{background:rgba(52,152,219,.12);border:1px solid rgba(52,152,219,.3);color:#3498db}
.s-cancelled{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:#e74c3c}

.action-btn{
  padding:5px 12px;border-radius:2px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;border:1px solid var(--borderl);background:transparent;color:var(--dim);
  font-family:'Montserrat',sans-serif;transition:all .18s;
}
.action-btn:hover{border-color:var(--gold);color:var(--gold)}
.action-btn.green-btn{border-color:rgba(39,174,96,.3);color:#2ecc71}
.action-btn.green-btn:hover{background:rgba(39,174,96,.1)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);z-index:9999;background:var(--dark3);border:1px solid var(--border);border-radius:40px;padding:12px 24px;font-size:11px;letter-spacing:1px;color:var(--text);transition:transform .35s cubic-bezier(.16,1,.3,1),opacity .3s;opacity:0;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Revenue chart */
.mini-chart{display:flex;align-items:flex-end;gap:4px;height:48px;margin-top:8px}
.mini-bar{background:rgba(201,168,76,.3);border-radius:1px 1px 0 0;flex:1;min-width:6px;transition:background .2s}
.mini-bar:hover{background:var(--gold)}

@media(max-width:768px){.stats-row{grid-template-columns:repeat(2,1fr)}.main{margin-left:0}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <a href="index.html" class="sidebar-logo">Ftesa Pro<span>Admin Panel</span></a>
  <nav class="sidebar-nav">
    <button class="s-item active" onclick="showTab('overview')" id="tab-overview">◈ Pamja</button>
    <button class="s-item" onclick="showTab('orders')" id="tab-orders">◻ Porositë</button>
    <button class="s-item" onclick="showTab('clients')" id="tab-clients">◉ Klientët</button>
    <button class="s-item" onclick="showTab('revenue')" id="tab-revenue">✦ Të Ardhurat</button>
  </nav>
  <div style="padding:16px 20px;border-top:1px solid var(--borderl)">
    <div style="font-size:9px;color:var(--dimmer);margin-bottom:8px">Logged as Admin</div>
    <button onclick="doLogout()" style="font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:rgba(231,76,60,.6);cursor:pointer;background:none;border:none;font-family:'Montserrat',sans-serif">Dilni ↗</button>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <div class="topbar-title" id="topbarTitle">Pamja e Përgjithshme</div>
    <div style="display:flex;gap:10px;align-items:center">
      <span style="font-size:9px;letter-spacing:2px;color:var(--dimmer)" id="lastRefresh">—</span>
      <button onclick="init()" style="padding:7px 16px;border:1px solid var(--border);border-radius:2px;background:transparent;color:var(--gold);font-size:8.5px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif">↻ Rifresko</button>
    </div>
  </header>
  <div class="content" id="mainContent"></div>
</main>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = https://wjvdposbkhxedvhlwlhx.supabase.co ;
const SUPABASE_ANON_KEY = sb_publishable_FqVMOFI8eWFyXFRgMXM9Kw_SbrIpwgv ;
// ⚠️ For admin panel use service_role key (keep this file PRIVATE, not on GitHub)
// const SUPABASE_SERVICE_KEY = 'YOUR_SERVICE_ROLE_KEY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allOrders = [], allProfiles = [], currentTab='overview';

async function init() {
  const { data:{ session } } = await sb.auth.getSession();
  // In production: check if user has admin role
  // if (!session || !isAdmin(session.user)) { window.location.href='/'; return; }

  document.getElementById('lastRefresh').textContent = 'Rifreskuar: ' + new Date().toLocaleTimeString('sq-AL');
  
  const [{ data:o }, { data:p }] = await Promise.all([
    sb.from('orders').select('*').order('created_at',{ascending:false}),
    sb.from('profiles').select('*').order('created_at',{ascending:false}),
  ]);
  allOrders = o||[]; allProfiles = p||[];
  showTab(currentTab);
}

function showTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.s-item').forEach(i=>i.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  const titles={overview:'Pamja e Përgjithshme',orders:'Të Gjitha Porositë',clients:'Klientët',revenue:'Të Ardhurat'};
  document.getElementById('topbarTitle').textContent = titles[tab];
  const c=document.getElementById('mainContent');
  if(tab==='overview') renderOverview(c);
  if(tab==='orders')   renderOrdersTab(c);
  if(tab==='clients')  renderClients(c);
  if(tab==='revenue')  renderRevenue(c);
}

function renderOverview(c) {
  const paid = allOrders.filter(o=>o.status==='paid'||o.status==='delivered');
  const revenue = paid.reduce((s,o)=>s+(o.amount||0),0);
  const thisMonth = new Date(); thisMonth.setDate(1); thisMonth.setHours(0,0,0,0);
  const monthOrders = allOrders.filter(o=>new Date(o.created_at)>=thisMonth);
  const monthRev = monthOrders.filter(o=>o.status==='paid'||o.status==='delivered').reduce((s,o)=>s+(o.amount||0),0);

  c.innerHTML = `
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-n">€${revenue}</span>
      <span class="stat-l">Të Ardhura Totale</span>
      <span class="stat-delta green">+€${monthRev} këtë muaj</span>
    </div>
    <div class="stat-card">
      <span class="stat-n">${allOrders.length}</span>
      <span class="stat-l">Porosi Gjithsej</span>
      <span class="stat-delta gold">${monthOrders.length} këtë muaj</span>
    </div>
    <div class="stat-card">
      <span class="stat-n">${allProfiles.length}</span>
      <span class="stat-l">Klientë Aktivë</span>
      <span class="stat-delta green">+${allProfiles.filter(p=>new Date(p.created_at)>=thisMonth).length} këtë muaj</span>
    </div>
    <div class="stat-card">
      <span class="stat-n">${allOrders.filter(o=>o.status==='pending').length}</span>
      <span class="stat-l">Në Pritje Pagese</span>
      <span class="stat-delta" style="color:#f1c40f">⚠ Kërkon vëmendje</span>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <div class="table-title">Porositë e Fundit</div>
      <button class="action-btn" onclick="showTab('orders')">Shiko të gjitha →</button>
    </div>
    <table><thead><tr>
      <th>Klienti</th><th>Template</th><th>Shuma</th><th>Statusi</th><th>Data</th><th>Veprime</th>
    </tr></thead><tbody>
    ${allOrders.slice(0,8).map(o=>{
      const p = allProfiles.find(p=>p.id===o.user_id);
      return `<tr>
        <td style="color:var(--text)">${p?.full_name||'—'}<br><span style="font-size:10px;color:var(--dimmer)">${p?.email||o.user_id?.slice(0,8)}</span></td>
        <td>${o.template_name||'T#'+o.template_id}</td>
        <td class="gold">€${o.amount||'—'}</td>
        <td><span class="status s-${o.status||'pending'}">${statusLabel(o.status)}</span></td>
        <td>${fmtDate(o.created_at)}</td>
        <td style="display:flex;gap:6px;flex-wrap:wrap">
          ${o.status==='pending'?`<button class="action-btn green-btn" onclick="markPaid(${o.id})">Konfirmo ✓</button>`:''}
          ${o.status==='paid'?`<button class="action-btn" onclick="markDelivered(${o.id})">Dorëzo</button>`:''}
          <button class="action-btn" onclick="viewOrder(${JSON.stringify(o).replace(/"/g,'&quot;')})">Detaje</button>
        </td>
      </tr>`;
    }).join('')}
    </tbody></table>
  </div>`;
}

function renderOrdersTab(c) {
  c.innerHTML = `
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">Të Gjitha Porositë (${allOrders.length})</div>
      <input class="search-input" placeholder="Kërko sipas emrit, templateit..." oninput="filterOrders(this.value)">
    </div>
    <div id="ordersTableWrap">${buildOrdersTable(allOrders)}</div>
  </div>`;
}

function filterOrders(q) {
  const filtered = allOrders.filter(o=>{
    const p = allProfiles.find(p=>p.id===o.user_id);
    return !q || (p?.full_name||'').toLowerCase().includes(q.toLowerCase()) || (o.template_name||'').toLowerCase().includes(q.toLowerCase());
  });
  document.getElementById('ordersTableWrap').innerHTML = buildOrdersTable(filtered);
}

function buildOrdersTable(orders) {
  if(!orders.length) return `<div style="text-align:center;padding:32px;color:var(--dimmer)">Nuk ka porosi</div>`;
  return `<table><thead><tr>
    <th>#</th><th>Klienti</th><th>Template</th><th>Plani</th><th>Të Ftuar</th><th>Shuma</th><th>Statusi</th><th>Data</th><th>Veprime</th>
  </tr></thead><tbody>
  ${orders.map((o,i)=>{
    const p = allProfiles.find(p=>p.id===o.user_id);
    return `<tr>
      <td style="color:var(--dimmer)">${i+1}</td>
      <td style="color:var(--text)">${p?.full_name||'—'}<br><span style="font-size:9.5px;color:var(--dimmer)">${p?.email||o.user_id?.slice(0,12)||'—'}</span></td>
      <td>${o.template_name||'T#'+o.template_id}</td>
      <td>${o.plan||'—'}</td>
      <td>${o.guests_count||'—'}</td>
      <td class="gold">€${o.amount||'—'}</td>
      <td><span class="status s-${o.status||'pending'}">${statusLabel(o.status)}</span></td>
      <td>${fmtDate(o.created_at)}</td>
      <td style="display:flex;gap:5px;flex-wrap:wrap">
        ${o.status==='pending'?`<button class="action-btn green-btn" onclick="markPaid('${o.id}')">✓ Paguar</button>`:''}
        ${o.status==='paid'?`<button class="action-btn" onclick="markDelivered('${o.id}')">Dorëzo</button>`:''}
        <button class="action-btn" style="color:rgba(231,76,60,.6)" onclick="cancelOrder('${o.id}')">Anulo</button>
      </td>
    </tr>`;
  }).join('')}
  </tbody></table>`;
}

function renderClients(c) {
  c.innerHTML = `
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">Klientët (${allProfiles.length})</div>
      <input class="search-input" placeholder="Kërko sipas emrit, emailit..." oninput="filterClients(this.value)">
    </div>
    <div id="clientsWrap">${buildClientsTable(allProfiles)}</div>
  </div>`;
}

function filterClients(q) {
  const f=allProfiles.filter(p=>!q||(p.full_name||'').toLowerCase().includes(q.toLowerCase())||(p.email||'').toLowerCase().includes(q.toLowerCase()));
  document.getElementById('clientsWrap').innerHTML=buildClientsTable(f);
}
function buildClientsTable(profiles) {
  if(!profiles.length) return `<div style="text-align:center;padding:32px;color:var(--dimmer)">Nuk ka klientë</div>`;
  return `<table><thead><tr>
    <th>Emri</th><th>Email</th><th>Plani</th><th>Porosi</th><th>Shuma Totale</th><th>Regjistruar</th><th>Veprime</th>
  </tr></thead><tbody>
  ${profiles.map(p=>{
    const pOrders = allOrders.filter(o=>o.user_id===p.id);
    const totalRev = pOrders.filter(o=>o.status==='paid'||o.status==='delivered').reduce((s,o)=>s+(o.amount||0),0);
    return `<tr>
      <td style="color:var(--text)">${p.full_name||'—'}</td>
      <td>${p.email||'—'}</td>
      <td><span class="status ${p.plan==='luxury'?'s-delivered':p.plan==='premium'?'s-paid':'s-pending'}">${p.plan||'free'}</span></td>
      <td>${pOrders.length}</td>
      <td class="gold">€${totalRev}</td>
      <td>${fmtDate(p.created_at)}</td>
      <td>
        <button class="action-btn" onclick="emailClient('${p.email}')">Dërgo Email</button>
      </td>
    </tr>`;
  }).join('')}
  </tbody></table>`;
}

function renderRevenue(c) {
  const paid = allOrders.filter(o=>o.status==='paid'||o.status==='delivered');
  const total = paid.reduce((s,o)=>s+(o.amount||0),0);
  // Monthly breakdown (last 6 months)
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setMonth(d.getMonth()-i); d.setDate(1); d.setHours(0,0,0,0);
    const next=new Date(d); next.setMonth(next.getMonth()+1);
    const mOrders=paid.filter(o=>{ const d2=new Date(o.created_at); return d2>=d&&d2<next; });
    const mRev=mOrders.reduce((s,o)=>s+(o.amount||0),0);
    months.push({ label:d.toLocaleString('sq-AL',{month:'short'}), rev:mRev, count:mOrders.length });
  }
  const maxRev=Math.max(...months.map(m=>m.rev),1);
  
  c.innerHTML = `
  <div class="stats-row">
    <div class="stat-card"><span class="stat-n">€${total}</span><span class="stat-l">Të Ardhura Totale</span></div>
    <div class="stat-card"><span class="stat-n">${paid.length}</span><span class="stat-l">Porosi të Paguara</span></div>
    <div class="stat-card"><span class="stat-n" style="color:#2ecc71">€${total?Math.round(total/paid.length):0}</span><span class="stat-l">Mesatare / Porosi</span></div>
    <div class="stat-card"><span class="stat-n" style="color:#3498db">${months[5].count}</span><span class="stat-l">Porosi Këtë Muaj</span></div>
  </div>
  <div class="table-card" style="padding:24px">
    <div class="table-title" style="margin-bottom:20px">Të Ardhurat Mujore</div>
    <div style="display:flex;gap:12px;align-items:flex-end;height:120px;padding-bottom:8px">
      ${months.map(m=>`
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="font-size:10px;color:var(--gold)">€${m.rev}</div>
        <div style="flex:1;width:100%;background:rgba(201,168,76,.18);border-radius:2px 2px 0 0;min-height:4px;height:${m.rev?Math.max(8,m.rev/maxRev*80)+'px':'4px'};transition:height .4s ease;position:relative;cursor:pointer" title="${m.label}: €${m.rev} (${m.count} porosi)">
          <div style="position:absolute;inset:0;background:rgba(201,168,76,.35);border-radius:2px 2px 0 0;opacity:${m.rev?1:.3}"></div>
        </div>
        <div style="font-size:9px;color:var(--dimmer);letter-spacing:1px">${m.label}</div>
      </div>`).join('')}
    </div>
  </div>
  <div class="table-card">
    <div class="table-header"><div class="table-title">Ndarja sipas Planit</div></div>
    <table><thead><tr><th>Plani</th><th>Porosi</th><th>Të Ardhura</th><th>%</th></tr></thead><tbody>
    ${['starter','premium','luxury'].map(plan=>{
      const pOrders=paid.filter(o=>o.plan===plan);
      const pRev=pOrders.reduce((s,o)=>s+(o.amount||0),0);
      return `<tr>
        <td style="text-transform:capitalize;color:var(--text)">${plan}</td>
        <td>${pOrders.length}</td>
        <td class="gold">€${pRev}</td>
        <td>${total?Math.round(pRev/total*100):0}%</td>
      </tr>`;
    }).join('')}
    </tbody></table>
  </div>`;
}

// ═══ ACTIONS ═══
async function markPaid(id) {
  await sb.from('orders').update({status:'paid'}).eq('id',id);
  showToast('✓ Porosia u shënua si e paguar');
  await init();
}
async function markDelivered(id) {
  await sb.from('orders').update({status:'delivered'}).eq('id',id);
  showToast('✓ Porosia u shënua si e dorëzuar');
  await init();
}
async function cancelOrder(id) {
  if(!confirm('Anuloni këtë porosi?')) return;
  await sb.from('orders').update({status:'cancelled'}).eq('id',id);
  showToast('Porosia u anulua');
  await init();
}
function emailClient(email) { window.open('mailto:'+email); }
function viewOrder(o) { alert(JSON.stringify(o, null, 2)); }

// ═══ UTILS ═══
async function doLogout() { await sb.auth.signOut(); window.location.href='index.html'; }
function statusLabel(s) { return {pending:'Në Pritje',paid:'Paguar',delivered:'Dorëzuar',cancelled:'Anuluar'}[s||'pending']||'—'; }
function fmtDate(d) { return d?new Date(d).toLocaleDateString('sq-AL',{day:'2-digit',month:'short',year:'numeric'}):'-'; }
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

init();
</script>
</body>
</html>
